services:

  frontend:
    
    # image from doockerHub
    image: mario247/htcc-frontend-prod:${IMAGE_TAG:-latest}
    
    # image from local service
    # image: htcc-frontend-dev:1.0.0
    container_name: htcc-frontend-prod

    ports:
      - "8080:80"
    environment:
       API_URL: "http://${API_HOST_IP}:5000"

    restart: always



  backend:

    # depends_on:
    #   - db
    # image from doockerHub
    image: mario247/htcc-backend-api-prod:${IMAGE_TAG:-latest}

    # image from local service
    # image: htcc-backend-api-dev:1.0.0
    container_name: htcc-backend-api-prod

    ports:
      - "5000:5000"
    environment:
      DB_CONNXTION_STRING: "${DB_CONNXTION_STRING}"
      PORT: "${PORT}"
      JWT_KEY: "${JWT_KEY}"
      #  VITE_FRONTEND_URL: "${VITE_FRONTEND_URL}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"


    restart: always

   