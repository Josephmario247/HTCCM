# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name htcmaitama.org www.htcmaitama.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name htcmaitama.org www.htcmaitama.org;

    # SSL certificates (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/htcmaitama.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/htcmaitama.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/htcmaitama.org/chain.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:
                        ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # ── Frontend (React/Vue/Next.js on :8080) ──────────────────
    location / {
        proxy_pass              http://frontend:8080;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade            $http_upgrade;
        proxy_set_header        Connection         "upgrade";
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        proxy_cache_bypass      $http_upgrade;
        proxy_read_timeout      60s;
        proxy_connect_timeout   60s;
    }

    # ── Backend API (Node/Django/FastAPI on :5000) ─────────────
    location /api/ {
        proxy_pass              http://backend:5000/;
        proxy_http_version      1.1;
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        proxy_read_timeout      90s;
        proxy_connect_timeout   90s;
        proxy_buffering         off;                # good for streaming APIs

        # CORS headers (remove if handled in app code)
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Static files cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        proxy_pass   http://frontend:8080;
        expires      1y;
        add_header   Cache-Control "public, immutable";
        access_log   off;
    }
}