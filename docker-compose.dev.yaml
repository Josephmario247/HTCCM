services:

  frontend:
    
    # image from doockerHub
    # image: mario247/htcc-frontend-dev:${IMAGE_TAG:-latest}
    
    # image from local service
    image: htcc-frontend-dev:1.0.0
    container_name: htcc-frontend-dev


    ports:
      - "5173:5173"
    environment:
       API_URL: "http://${API_HOST_IP}:5000"
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

    

    # depends_on:
    #   - backend

    develop:
      watch:
        - path: ./frontend/package.json
          action: rebuild
        - path: ./frontend/package-lock.json
          action: rebuild
        - path: ./frontend
          target: /app
          action: sync

  backend:

    # depends_on:
    #   - db
    # image from doockerHub
    # image: mario247/htcc-backend-api:${IMAGE_TAG:-latest}

    # image from local service
    image: htcc-backend-api-dev:1.0.0
    container_name: htcc-backend-api-dev

    ports:
      - "5000:5000"
    environment:
       DB_CONNXTION_STRING: "${DB_CONNXTION_STRING}"
       PORT: "${PORT}"
       JWT_kEY: "${JWT_KEY}"
      #  VITE_FRONTEND_URL: "${VITE_FRONTEND_URL}"
       ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
    build:
      context: ./backend
      dockerfile: Dockerfile.dev

    
    develop:
      watch:
        - path: ./backend/package.json
          action: rebuild
        - path: ./backend/package-lock.json
          action: rebuild
        - path: ./backend
          target: /app
          action: sync


 